<!DOCTYPE html>
<html>
<head>
<title>Cart</title>
<style>
body { font-family: Arial; background: #f5f5f5; }

.container {
    width: 60%;
    margin: auto;
}

.item {
    display: flex;
    gap: 20px;
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.item img {
    width: 80px;
}

.buy-btn {
    display: block;
    margin: 30px auto;
    background: green;
    color: white;
    border: none;
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
    border-radius: 10px;
}

.buy-btn:hover {
    background: darkgreen;
}
</style>
</head>
<body>

<h2 style="text-align:center;">🛒 Your Cart</h2>

<div class="container" id="cartItems"></div>

<h2 style="text-align:center;">
    Total: ₹<span id="total">0</span>
</h2>

<button class="buy-btn" onclick="window.location.href='address.html'">Buy Now</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

let container = document.getElementById("cartItems");

cart.forEach(item => {
    total += item.price;

    container.innerHTML += `
        <div class="item">
            <img src="${item.image}">
            <div>
                <h3>${item.name}</h3>
                <p>₹${item.price}</p>
            </div>
        </div>
    `;
});

document.getElementById("total").innerText = total;


</script>

</body>
</html>
