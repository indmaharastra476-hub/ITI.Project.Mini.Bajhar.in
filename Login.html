<!DOCTYPE html>
<html>

<head>
    <title>Mini bajar Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body like="orange" vlink="white">
    <div class="login-container">
        <div class="circles-wrapper">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>

        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm" action="Mini Bajar1.html">
                <div class="input-group">
                    <input type="text" id="userName" placeholder="Login Mini bajar" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="•••••••••••••" required>
                </div>
                <button type="submit" class="sign-in-btn" onclick="saveLogin()"> Submit </button>
                <div class="links">
                    <a href="#" id="forgotPassword">Forgot Password</a>
                    <a href="#" id="signUp">Sign Up</a>
                </div>
            </form>
        </div>
    </div>
       <script>
        function saveLogin() {
            var name = document.getElementById("userName").value;
            if (name == "") {
                alert("Please enter your name");
            } else {

                localStorage.setItem("user_profile_name", name);

                window.location.href = "profile.html";
            }
        }
    </script>
    </body>

</html>
