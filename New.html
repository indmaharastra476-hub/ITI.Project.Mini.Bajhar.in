/* Header Styling */
        .header-section { text-align: center; margin-bottom: 30px; }

        h1 { font-size: 45px; color: #1a237e; margin-top: 10px; }

       .contact-container { 
            display: flex; 
            gap: 50px; 
            background: white; 
            padding: 50px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            flex: 1; 
            align-items: stretch; 
        }


        /* Form Styling */
        .form-section { flex: 2; display: flex; flex-direction: column; justify-content: space-between; }
        .input-group { display: flex; gap: 20px; margin-bottom: 25px; }
        
       #Name, select, textarea { 
            width: 100%; 
            padding: 18px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            outline: none; 
            font-size: 16px; 
            color: #333; 
            background: #fafafa;
        }
        textarea { flex: 1; min-height: 200px; resize: none; margin-bottom: 20px; }
        
        .send-btn { 
            width: 100%; 
            background-color: #ff0000; 
            color: white; 
            border: none; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
            border-radius: 6px; 
            transition: 0.3s; 
        }
        .send-btn:hover { background-color: #cc0000; transform: translateY(-2px); }

        /* Info Styling */
        .info-section { 
            flex: 1; 
            border-left: 1px solid #eee; 
            padding-left: 50px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        .info-item { margin-bottom: 35px; }
        .info-label { color: #ff0000; font-weight: 700; font-size: 20px; margin-bottom: 8px; }
        .info-text { color: #444; font-size: 17px; line-height: 1.6; }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            body { padding: 20px; }
            .contact-container { flex-direction: column; }
            .info-section { border-left: none; padding-left: 0; border-top: 1px solid #eee; padding-top: 40px; }
            .input-group { flex-direction: column; gap: 15px; }
            h1 { font-size: 32px; }
        }




</style>
