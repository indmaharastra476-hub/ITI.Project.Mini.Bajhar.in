<!DOCTYPE html>
<html lang="mr">
<head>
  
    <title>Mini Bajar | Welcome</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Font professional disnyasathi hi link head madhe garjechi ahe */
    font-family: 'Montserrat', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f0f2f5; 
}

.welcome-box {
    text-align: center;
    padding: 60px 50px; /* Padding vadhavli ahe */
    background: #ffffff;
    border-radius: 40px;
    box-shadow: 20px 20px 60px #d1d9e6, -20px -20px 60px #ffffff;
    max-width: 650px; /* Card chi width thodi vadhavli ahe */
    width: 100%;
}

/* 1. Welcome Text (Adhi 1.00rem hota, ata vadhavla ahe) */
.welcome-text {
    font-size: calc(1.00rem + 10px); 
    font-weight: 600;
    color: #ff4757;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 15px;
}

/* 2. Bag Icon (Adhi 50px hota, ata 60px) */
.bag-icon {
    font-size: 60px;
    margin-bottom: 25px;
}

/* 3. Main Title (Adhi 3.5rem hota, ata ~4.2rem) */
h1 {
    font-size: 4.2rem; 
    font-weight: 800;
    color: #2d3436;
    letter-spacing: -2px;
    margin-bottom: 15px;
}

h1 span {
    color: #00b894;
}

/* 4. Paragraph (Adhi 1.1rem hota, ata ~1.7rem) */
p {
    color: #636e72;
    font-size: 1.7rem; 
    font-weight: 400;
    margin-bottom: 40px;
}

.divider {
    width: 70px; /* Width vadhavli */
    height: 6px;  /* Thickness vadhavli */
    background: #00b894;
    margin: 0 auto 40px;
    border-radius: 10px;
}

/* 5. Button (Padding ani Font vadhavla ahe) */
button {
    background: #2d3436;
    color: white;
    border: none;
    padding: 28px 55px; /* Size vadhavli ahe */
    font-size: calc(1rem + 10px); 
    font-weight: 600;
    border-radius: 60px;
    cursor: pointer;
    transition: all 0.4s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

button:hover {
    background: #00b894;
    transform: scale(1.05);
    box-shadow: 0 15px 25px rgba(0, 184, 148, 0.3);
}
</style>

</head>
<body><form action="Mini Bajar.html">

    <div class="welcome-box">

        <div class="bag-icon">🛍️</div>
	 <p class="welcome-text">WELCOME TO</p>
        <h1>Mini <span>Bajar</span></h1>
        <p>Mini Bajar madhe tumche swagat ahe. Ithe tumhala milel sarva kahi ekdam kami kimtit.</p>
        <div class="divider"></div>
        <button id="enterBtn" type="submit">Shopping Suru Kara</button>
    </div>
</form>
</body>
</html>
