<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    padding:20px;
}

.checkout-box{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, textarea{
    width:475px;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    background:#ff9900;
    color:white;
    border:none;
    padding:12px;
    font-size:18px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e68a00;
}
</style>

</head>
<body>
<div class="checkout-box">

<h2>Add Delivery Address</h2>

<input type="text" id="name" placeholder="Full Name"><br><br>

<input type="text" id="mobile" placeholder="Mobile Number"><br><br>

<textarea id="address" placeholder="Full Address"></textarea><br><br>

<button onclick="saveAddress()">Continue</button>

<script>
function saveAddress(){

    localStorage.setItem("name",
        document.getElementById("name").value);

    localStorage.setItem("mobile",
        document.getElementById("mobile").value);

    localStorage.setItem("address",
        document.getElementById("address").value);

    window.location.href = "confirm.html";
}
</script>
</div>

</body>
</html>
