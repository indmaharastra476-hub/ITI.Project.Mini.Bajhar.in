<!DOCTYPE html>
<html>
<head>
<title>Confirm Order</title>

<style>



body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#e3f2fd,#f5f5f5);
    margin:0;
    padding:30px;
}

.container{
    width:70%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

h2{
    color:#333;
    border-left:5px solid #ff9900;
    padding-left:10px;
}

.item{
    display:flex;
    gap:20px;
    margin:15px 0;
    padding:15px;
    border-radius:10px;
    background:#fafafa;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    transition:0.3s;
}

.item:hover{
    transform:scale(1.02);
}

.item img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:10px;
    border:1px solid #ddd;
}

.item h3{
    margin:0;
    color:#222;
}

.item p{
    color:#666;
}

.summary{
    background:#f8f8f8;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}

.summary h3,
.summary h2{
    margin:10px 0;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff9900,#ff6600);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
    margin-top:20px;
}

button:hover{
    background:linear-gradient(90deg,#ff6600,#ff9900);
    transform:translateY(-2px);
}

.address-box{
    background:#f8f8f8;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>


</head>
<body>

<div class="container">

<h2>📍 Delivery Address</h2>

<div class="address-box">
    <p><b>Name:</b> <span id="name"></span></p>
    <p><b>Mobile:</b> <span id="mobile"></span></p>
    <p><b>Address:</b> <span id="address"></span></p>
</div>

<h2>🛒 Product Details</h2>

<div id="products"></div>

<div class="summary">
    <h3>Product Total : ₹<span id="productTotal">0</span></h3>
    <h3>Delivery Charge : ₹10</h3>
    <h2>Grand Total : ₹<span id="grandTotal">0</span></h2>
</div>

<button onclick="confirmOrder()">
    ✅ Confirm Order
</button>

</div>

<script>

// Address
document.getElementById("name").innerText =
localStorage.getItem("name");

document.getElementById("mobile").innerText =
localStorage.getItem("mobile");

document.getElementById("address").innerText =
localStorage.getItem("address");

// Products
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let productDiv = document.getElementById("products");

let total = 0;

cart.forEach(item => {

    total += Number(item.price);

    productDiv.innerHTML += `
        <div class="item">
            <img src="${item.image}">
            <div>
                <h3>${item.name}</h3>
                <p>Price : ₹${item.price}</p>
            </div>
        </div>
    `;
});

document.getElementById("productTotal").innerText = total;

let grandTotal = total + 10;

document.getElementById("grandTotal").innerText = grandTotal;

function confirmOrder(){

    alert("Order Placed Successfully! ✅\nThank you for shopping 🛍️");

    localStorage.removeItem("cart");

    window.location.href="Mini Bajar1.html";
}
</script>

</body>
</html>
